<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Amber background -->
  <circle cx="60" cy="60" r="58" fill="#F59E0B" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Left arm - amber outfit -->
  <path d="M36 72 C30 74 24 80 24 88 C24 94 28 98 34 97 L38 95 L38 72 Z" fill="#B45309" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right arm holding clipboard -->
  <path d="M84 72 C90 74 96 80 96 88 C96 94 92 98 86 97 L82 95 L82 72 Z" fill="#B45309" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Body - warm amber outfit -->
  <rect x="36" y="67" width="48" height="38" rx="10" fill="#B45309" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Clipboard in right hand area -->
  <rect x="86" y="74" width="14" height="18" rx="2" fill="white" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Clipboard clip -->
  <rect x="90" y="72" width="6" height="4" rx="1" fill="#B45309" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Clipboard lines -->
  <line x1="89" y1="80" x2="97" y2="80" stroke="#1A1A1A" stroke-width="1.2"/>
  <line x1="89" y1="84" x2="97" y2="84" stroke="#1A1A1A" stroke-width="1.2"/>
  <line x1="89" y1="88" x2="97" y2="88" stroke="#1A1A1A" stroke-width="1.2"/>

  <!-- Neck -->
  <rect x="55" y="62" width="10" height="7" rx="3" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Head -->
  <circle cx="60" cy="43" r="22" fill="white" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Ears -->
  <ellipse cx="38" cy="43" rx="4" ry="5.5" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>
  <ellipse cx="82" cy="43" rx="4" ry="5.5" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Hair - warm brown in neat bun -->
  <!-- Base hair -->
  <path d="M38 43 C38 28 43 21 60 21 C77 21 82 28 82 43 C80 36 76 30 70 27 C66 25 63 24 60 24 C57 24 54 25 50 27 C44 30 40 36 38 43 Z" fill="#8B4513" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Bun on top -->
  <circle cx="60" cy="18" r="9" fill="#8B4513" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Bun wrap line -->
  <path d="M51 18 Q60 22 69 18" stroke="#6B3410" stroke-width="1.8" fill="none"/>
  <!-- Bun stem/base -->
  <path d="M55 23 C56 21 60 20 60 21 C60 20 64 21 65 23" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyes - warm, friendly -->
  <circle cx="52" cy="43" r="3" fill="#1A1A1A"/>
  <circle cx="68" cy="43" r="3" fill="#1A1A1A"/>
  <circle cx="53.2" cy="41.8" r="1.1" fill="white"/>
  <circle cx="69.2" cy="41.8" r="1.1" fill="white"/>

  <!-- Blush - warm and rosy -->
  <circle cx="44" cy="49" r="6" fill="#FFB7C5" opacity="0.7"/>
  <circle cx="76" cy="49" r="6" fill="#FFB7C5" opacity="0.7"/>

  <!-- Big warm friendly smile -->
  <path d="M53 52 Q60 59 67 52" stroke="#1A1A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M54 54 Q60 58 66 54 Q60 60 54 54 Z" fill="white" stroke="none"/>
</svg>
