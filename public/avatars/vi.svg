<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Teal background -->
  <circle cx="60" cy="60" r="58" fill="#14B8A6" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Left arm - grey hoodie -->
  <path d="M36 72 C30 74 24 80 24 88 C24 94 28 98 34 97 L38 95 L38 72 Z" fill="#4B5563" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right arm -->
  <path d="M84 72 C90 74 96 80 96 88 C96 94 92 98 86 97 L82 95 L82 72 Z" fill="#4B5563" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Body - grey hoodie -->
  <rect x="36" y="67" width="48" height="38" rx="10" fill="#4B5563" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Hoodie pocket -->
  <rect x="48" y="78" width="24" height="14" rx="5" fill="#374151" stroke="#1A1A1A" stroke-width="1.8"/>
  <!-- Hoodie kangaroo strings -->
  <line x1="57" y1="67" x2="54" y2="75" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/>
  <line x1="63" y1="67" x2="66" y2="75" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="55" y="62" width="10" height="7" rx="3" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Head -->
  <circle cx="60" cy="43" r="22" fill="white" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Ears -->
  <ellipse cx="38" cy="43" rx="4" ry="5.5" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>
  <ellipse cx="82" cy="43" rx="4" ry="5.5" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Headphones - arc over head -->
  <path d="M34 40 C34 22 86 22 86 40" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Headphone pads (left) -->
  <rect x="28" y="36" width="12" height="14" rx="5" fill="#14B8A6" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Headphone pads (right) -->
  <rect x="80" y="36" width="12" height="14" rx="5" fill="#14B8A6" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Hair - short teal colored -->
  <path d="M38 43 C38 30 43 22 60 21 C77 22 82 30 82 43 C80 36 76 30 70 27 C66 25 63 24 60 24 C57 24 54 25 50 27 C44 30 40 36 38 43 Z" fill="#0D9488" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Front hair spikes -->
  <path d="M50 24 C52 20 56 20 58 22" stroke="#0D9488" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M62 22 C64 20 68 20 70 24" stroke="#0D9488" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes - curious, slightly wide -->
  <circle cx="52" cy="43" r="3" fill="#1A1A1A"/>
  <circle cx="68" cy="43" r="3" fill="#1A1A1A"/>
  <circle cx="53.2" cy="41.8" r="1.1" fill="white"/>
  <circle cx="69.2" cy="41.8" r="1.1" fill="white"/>

  <!-- Blush -->
  <circle cx="44" cy="49" r="5" fill="#FFB7C5" opacity="0.6"/>
  <circle cx="76" cy="49" r="5" fill="#FFB7C5" opacity="0.6"/>

  <!-- Curious/focused expression -->
  <path d="M55 53 Q60 56 65 53" stroke="#1A1A1A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
